name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --group lint
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run mypy src

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --group test
      - run: uv run coverage run -m pytest
      - run: uv run coverage report

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arc
          POSTGRES_PASSWORD: arc
          POSTGRES_DB: arc_model_lab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arc -d arc_model_lab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ARC_DATABASE_URL: postgresql+psycopg://arc:arc@localhost:5432/arc_model_lab
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run alembic check

  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run python -m arc_model_lab.db.seed_models --check seeds/models.local.json

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: arc-model-lab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv export --frozen --no-dev --no-emit-project --output-file requirements.txt
      # Advisory: torch/transformers pull a large transitive tree with periodic CVEs.
      # Make blocking once the team sets a vulnerability triage policy.
      - run: uvx pip-audit --requirement requirements.txt
        continue-on-error: true
