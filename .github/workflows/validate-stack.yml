name: validate-stack

on:
  pull_request:
    paths:
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".github/instructions/**"
      - ".github/skills/**"
      - ".github/copilot-instructions.md"
      - ".github/scripts/validate_stack.py"
      - "AGENTS.md"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Copilot stack
        run: python .github/scripts/validate_stack.py
